<section class="contact" id="contact">
  <div class="contact-container">
    <div class="contact-intro">
      <h2 class="contact-title">Contact Us<span style="color: #d42c3d;">.</span></h2>
      <p class="contact-subtitle">Need more information? Get in touch with us</p>
    </div>
    <div class="contact-layout">
      <div class="contact-info-list">
        <div class="contact-info-card">
          <div class="contact-info-icon"><img src="assets/01 - Home Page/05 - Contact/01.png" alt="Phone"></div>
          <div class="contact-info-details">
            <span class="contact-info-label">Phone</span>
            <span class="contact-info-value">+91 9170704499</span>
          </div>
        </div>
        <div class="contact-info-card">
          <div class="contact-info-icon"><img src="assets/01 - Home Page/05 - Contact/02.png" alt="Email"></div>
          <div class="contact-info-details">
            <span class="contact-info-label">Email</span>
            <span class="contact-info-value">eclanarrative@gmail.com</span>
          </div>
        </div>
        <div class="contact-info-card">
          <div class="contact-info-icon"><img src="assets/01 - Home Page/05 - Contact/03.png" alt="Location"></div>
          <div class="contact-info-details">
            <span class="contact-info-label">Location</span>
            <span class="contact-info-value">shalimar oel, new hyderabad, Lucknow - 226006</span>
          </div>
        </div>
      </div>
      <div class="contact-form-container">
        <div class="contact-form-header">
          <h3 class="contact-form-title">Send Message</h3>
          <p class="contact-form-subtitle">Fill the form & get in touch.</p>
        </div>
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
          <div class="form-row">
            <div class="form-group accent">
              <input type="text" class="form-input" placeholder="Name" required>
            </div>
            <div class="form-group">
              <input type="tel" class="form-input" placeholder="Phone Number" required>
            </div>
          </div>
          <div class="form-group">
            <input type="email" class="form-input" placeholder="Email" required>
          </div>
          <div class="form-group">
            <textarea class="form-input" placeholder="Message" rows="2" style="resize:none;" required></textarea>
          </div>
          <div class="form-submit-row">
            <button type="submit" class="form-submit-btn">Send</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
